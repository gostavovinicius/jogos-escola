<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo das Sílabas</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap");

      :root {
        --bg-page: #c1a98e;
        --bg-page-deep: #8f6e52;
        --frame: #1d1815;
        --cream-0: #fff8ef;
        --cream-1: #f9edd8;
        --cream-2: #efd7b2;
        --card: rgba(255, 255, 255, 0.9);
        --card-soft: rgba(255, 248, 239, 0.88);
        --teal: #59c3c3;
        --teal-deep: #2f8f9a;
        --teal-soft: rgba(89, 195, 195, 0.16);
        --gold: #f7c984;
        --gold-soft: rgba(247, 201, 132, 0.18);
        --ink: #493628;
        --ink-soft: rgba(73, 54, 40, 0.68);
        --success: #22c55e;
        --danger: #d95b5b;
        --focus: #2f8f9a;
        --slot-border: rgba(123, 106, 90, 0.3);
        --row-tile-w: 82px;
        --row-tile-h: 68px;
        --row-icon-w: 82px;
        --row-check-size: 38px;
        --surface-inset: clamp(6px, 1vh, 8px);
        --surface-gap: clamp(8px, 1.5vh, 12px);
        --surface-padding: clamp(10px, 2vh, 16px);
        --panel-gap: clamp(10px, 1.4vh, 14px);
        --bank-panel-width: clamp(196px, 29%, 246px);
        --shadow-soft: 0 10px 26px rgba(82, 56, 24, 0.12);
        --shadow-card: 0 12px 28px rgba(103, 69, 33, 0.16);
        --shadow-glow: 0 0 0 1px rgba(89, 195, 195, 0.14), 0 0 22px rgba(89, 195, 195, 0.24);
        --check-pattern:
          linear-gradient(45deg, rgba(255, 255, 255, 0.96) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.96) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(222, 222, 222, 0.96) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(222, 222, 222, 0.96) 75%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background: linear-gradient(180deg, #2a231f, var(--frame));
        color: var(--ink);
        font-family: "Poppins", "Trebuchet MS", sans-serif;
      }

      #game-wrapper {
        width: 100%;
        height: 100%;
        min-height: 100%;
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #2a231f, var(--frame));
        border: 4px solid rgba(0, 0, 0, 0.72);
        border-radius: clamp(20px, 3vw, 28px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .game-surface {
        position: absolute;
        inset: var(--surface-inset);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: var(--surface-gap);
        padding: var(--surface-padding);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 35%),
          radial-gradient(circle at right, rgba(255, 218, 173, 0.3), transparent 26%),
          linear-gradient(180deg, var(--cream-0) 0%, var(--cream-1) 100%);
        border-radius: clamp(18px, 3vw, 22px);
        box-shadow:
          inset 0 0 0 1px rgba(84, 58, 34, 0.12),
          inset 0 10px 28px rgba(255, 255, 255, 0.45);
        transition: filter 0.22s ease;
      }

      #game-wrapper.modal-open .game-surface {
        filter: blur(4px) saturate(0.72);
      }

      .hud,
      .status-bar,
      .word-row,
      .bank-panel,
      .word-figure,
      .drop-slot,
      .syllable-card,
      .modal-card {
        border: 2px solid rgba(79, 57, 37, 0.72);
      }

      .hud,
      .status-bar,
      .word-row,
      .bank-panel {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.36)),
          var(--card-soft);
        box-shadow: var(--shadow-soft);
      }

      .hud {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(8px, 1vw, 10px);
        padding: clamp(8px, 1.6vh, 10px) clamp(10px, 1.6vw, 14px);
        border-radius: clamp(18px, 3vw, 22px);
      }

      .hud-title {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 2px;
        min-width: 0;
      }

      .hud-title strong {
        font-size: clamp(1.5rem, 2.6vw, 2rem);
        text-transform: uppercase;
        letter-spacing: 0.02em;
        font-weight: 800;
        line-height: 1;
      }

      .hud-title span {
        font-size: clamp(0.85rem, 1vw, 1rem);
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 600;
        line-height: 1.1;
      }

      .hud-button,
      .level-button,
      .next-phase-button {
        border: 2px solid rgba(79, 57, 37, 0.28);
        background: linear-gradient(180deg, #67d1cf, #44b5b7);
        color: #fffefc;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          background-color 0.12s ease,
          filter 0.12s ease;
        box-shadow: 0 10px 18px rgba(78, 184, 185, 0.28);
      }

      .hud-button,
      .level-button {
        min-height: clamp(42px, 7vh, 48px);
        padding: clamp(8px, 1.2vh, 10px) clamp(14px, 2vw, 18px);
        border-radius: clamp(14px, 2.5vw, 16px);
      }

      .hud-button:hover,
      .level-button:hover,
      .next-phase-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(78, 184, 185, 0.34);
        filter: saturate(1.04);
      }

      .hud-button:focus-visible,
      .level-button:focus-visible,
      .next-phase-button:focus-visible,
      .drop-slot:focus-visible,
      .syllable-card:focus-visible {
        outline: 4px solid var(--focus);
        outline-offset: 2px;
      }

      .board {
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--bank-panel-width);
        gap: var(--panel-gap);
        min-height: 0;
      }

      .rows-panel {
        display: grid;
        grid-template-rows: repeat(4, minmax(0, 1fr));
        gap: var(--panel-gap);
        min-height: 0;
      }

      .word-row {
        display: grid;
        grid-template-columns: var(--row-icon-w) minmax(0, 1fr) var(--row-check-size);
        gap: var(--panel-gap);
        width: 100%;
        padding: clamp(10px, 1.6vh, 12px) clamp(10px, 1.5vw, 14px);
        border-radius: clamp(18px, 3vw, 24px);
        min-height: 0;
        align-self: center;
        align-items: center;
        transition:
          background-color 0.18s ease,
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }

      .word-row.is-complete {
        background:
          linear-gradient(180deg, rgba(226, 255, 238, 0.92), rgba(255, 255, 255, 0.88)),
          var(--card);
        box-shadow:
          0 14px 28px rgba(34, 197, 94, 0.12),
          0 0 0 1px rgba(34, 197, 94, 0.2);
      }

      .word-figure {
        margin: 0;
        width: var(--row-icon-w);
        min-width: var(--row-icon-w);
        height: var(--row-tile-h);
        min-height: var(--row-tile-h);
        padding: clamp(6px, 1.1vh, 8px);
        border-radius: clamp(16px, 2.6vw, 20px);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 48%),
          linear-gradient(180deg, #fffefe, #f6efe6);
        display: grid;
        place-items: center;
        position: relative;
        align-self: center;
        justify-self: start;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(79, 57, 37, 0.08);
      }

      .word-emoji {
        display: block;
        font-size: clamp(2rem, 3.4vw, 2.65rem);
        line-height: 1;
        filter: drop-shadow(0 6px 8px rgba(73, 54, 40, 0.16));
        transform: translateY(1px);
      }

      .word-row.is-complete .word-figure {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 48%),
          linear-gradient(180deg, rgba(224, 255, 233, 1), rgba(240, 255, 244, 1));
      }

      .word-main {
        min-width: 0;
        min-height: var(--row-tile-h);
        display: flex;
        align-items: center;
        align-self: center;
      }

      .slots {
        min-width: 0;
        min-height: var(--row-tile-h);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: clamp(8px, 1vw, 10px);
      }

      .drop-slot {
        width: var(--row-tile-w);
        min-width: var(--row-tile-w);
        height: var(--row-tile-h);
        border-radius: clamp(16px, 2.6vw, 20px);
        background-color: #f0ebe4;
        background-image: var(--check-pattern);
        background-position:
          0 0,
          0 8px,
          8px -8px,
          -8px 0;
        background-size: 18px 18px;
        display: grid;
        place-items: center;
        position: relative;
        border-style: dashed;
        border-color: var(--slot-border);
        transition:
          transform 0.14s ease,
          border-color 0.14s ease,
          box-shadow 0.14s ease,
          background-color 0.14s ease;
      }

      .drop-slot::after {
        content: "?";
        font-size: clamp(0.92rem, 1.3vw, 1.08rem);
        font-weight: 700;
        color: rgba(73, 54, 40, 0.2);
      }

      .drop-slot.is-filled {
        border-style: solid;
        border-color: rgba(89, 195, 195, 0.22);
        background:
          linear-gradient(180deg, rgba(230, 255, 248, 0.88), rgba(255, 255, 255, 0.96));
        box-shadow: 0 8px 18px rgba(89, 195, 195, 0.16);
      }

      .drop-slot.is-filled::after {
        content: none;
      }

      .drop-slot.is-hover-valid {
        border-color: rgba(89, 195, 195, 0.8);
        box-shadow: var(--shadow-glow);
        transform: translateY(-2px);
        background-color: #f2fffc;
      }

      .drop-slot.is-hover-invalid {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px rgba(217, 91, 91, 0.12);
      }

      .bank-panel {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: clamp(8px, 1.2vh, 10px);
        padding: clamp(10px, 1.8vh, 14px);
        border-radius: clamp(18px, 3vw, 24px);
        min-height: 0;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 50%),
          linear-gradient(180deg, rgba(255, 244, 226, 0.96), rgba(250, 234, 208, 0.92));
      }

      .bank-header h2,
      .modal-card h2 {
        margin: 0;
        font-size: clamp(1rem, 1.5vw, 1.18rem);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 800;
      }

      .bank-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
        gap: clamp(8px, 1.1vh, 10px);
        align-content: stretch;
        min-height: 0;
        height: 100%;
        overflow: hidden;
        padding-right: 2px;
      }

      .syllable-card,
      .placed-card {
        min-height: clamp(50px, 10vh, 62px);
        padding: clamp(6px, 1.2vh, 8px) clamp(8px, 1.2vw, 10px);
        border-radius: clamp(14px, 2.6vw, 18px);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 251, 247, 0.98));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: clamp(0.98rem, 1.45vw, 1.28rem);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--ink);
      }

      .syllable-card {
        width: 100%;
        min-height: 0;
        height: 100%;
        border-color: rgba(47, 143, 154, 0.62);
        box-shadow:
          0 8px 16px rgba(89, 195, 195, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        cursor: grab;
        user-select: none;
        touch-action: none;
        transition:
          transform 0.14s ease,
          box-shadow 0.14s ease,
          background-color 0.14s ease,
          opacity 0.14s ease;
      }

      .syllable-card:hover:not(.is-used) {
        transform: translateY(-1px);
        box-shadow:
          0 12px 20px rgba(89, 195, 195, 0.16),
          0 0 0 1px rgba(89, 195, 195, 0.22);
      }

      .syllable-card.is-selected {
        background: linear-gradient(180deg, rgba(229, 255, 251, 0.98), rgba(235, 255, 252, 0.98));
        box-shadow:
          var(--shadow-glow),
          0 10px 18px rgba(89, 195, 195, 0.18);
        transform: translateY(-1px);
      }

      .syllable-card.is-dragging {
        opacity: 0.18;
      }

      .syllable-card.is-lifted {
        cursor: grabbing;
        box-shadow:
          0 18px 28px rgba(89, 195, 195, 0.22),
          var(--shadow-glow);
      }

      .syllable-card.is-used {
        opacity: 0.22;
        background: linear-gradient(180deg, rgba(249, 229, 198, 0.9), rgba(248, 235, 215, 0.9));
        border-color: rgba(182, 155, 111, 0.35);
        color: rgba(73, 54, 40, 0.32);
        pointer-events: none;
        box-shadow: none;
      }

      .syllable-card.is-rejected,
      .drop-slot.is-rejected {
        animation: shake 0.26s ease;
      }

      .placed-card {
        width: calc(100% - 8px);
        min-height: calc(var(--row-tile-h) - 8px);
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(233, 255, 247, 0.96), rgba(255, 255, 255, 1));
        border-color: rgba(89, 195, 195, 0.28);
        box-shadow: 0 10px 18px rgba(89, 195, 195, 0.16);
      }

      .placed-card.is-placed {
        animation: pop-in 0.26s ease;
      }

      .row-check {
        align-self: center;
        justify-self: center;
        width: var(--row-check-size);
        height: var(--row-check-size);
        border-radius: 999px;
        background: linear-gradient(180deg, #39d96a, #16b54f);
        color: white;
        font-size: 1.28rem;
        display: grid;
        place-items: center;
        box-shadow: 0 10px 18px rgba(34, 197, 94, 0.28);
        opacity: 0;
        transform: scale(0.7);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .word-row.is-complete .row-check {
        opacity: 1;
        transform: scale(1);
      }

      .word-row.is-just-completed {
        animation: complete-pulse 0.42s ease;
      }

      .drop-slot.is-celebrating {
        animation: slot-celebrate 0.34s ease;
      }

      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: clamp(8px, 1vw, 12px);
        padding: clamp(10px, 1.8vh, 12px) clamp(12px, 1.5vw, 14px);
        border-radius: clamp(16px, 2.8vw, 18px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(255, 250, 244, 0.86)),
          var(--card-soft);
      }

      .status-text {
        margin: 0;
        min-width: 0;
        font-size: clamp(0.86rem, 1vw, 1rem);
        line-height: 1.2;
      }

      .status-text strong {
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .next-phase-button {
        width: clamp(52px, 7vh, 62px);
        height: clamp(42px, 6.8vh, 48px);
        border-radius: clamp(14px, 2.5vw, 16px);
        font-size: clamp(1.05rem, 1.8vw, 1.28rem);
        line-height: 1;
      }

      .next-phase-button[hidden] {
        display: none;
      }

      .modal {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: clamp(16px, 4vh, 24px);
        background: rgba(0, 0, 0, 0.34);
        z-index: 5;
      }

      .modal.is-visible {
        display: flex;
      }

      .modal-card {
        width: min(100%, 360px);
        padding: clamp(18px, 4vh, 24px) clamp(16px, 3vw, 20px) clamp(16px, 3vh, 20px);
        border-radius: clamp(18px, 3vw, 24px);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 52%),
          linear-gradient(180deg, #fffdf9, #f7ecd8);
        text-align: center;
        box-shadow: 0 20px 40px rgba(37, 23, 10, 0.28);
      }

      .level-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .level-button {
        min-height: clamp(64px, 12vh, 74px);
        padding: clamp(10px, 1.8vh, 12px);
        font-size: clamp(0.96rem, 1.5vw, 1.04rem);
      }

      .level-button.is-aee {
        grid-column: 1 / -1;
        justify-self: center;
        width: min(100%, 280px);
        background: linear-gradient(180deg, #2ec27e, #16995f);
        box-shadow: 0 10px 18px rgba(22, 153, 95, 0.22);
      }

      .touch-ghost {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 99999;
        display: none;
        width: max-content;
        min-width: 88px;
        max-width: none;
        white-space: nowrap;
        pointer-events: none;
        transform: translate(-50%, -58%);
        border-color: rgba(47, 143, 154, 0.65);
        box-shadow:
          0 18px 30px rgba(89, 195, 195, 0.2),
          var(--shadow-glow);
      }

      #game-wrapper.aee-mode {
        background: #f4f0e8;
        border-color: #111111;
      }

      #game-wrapper.aee-mode .game-surface {
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: clamp(6px, 1.1vh, 10px);
        padding: clamp(8px, 1.4vh, 12px);
        background: #fffdf7;
        box-shadow: inset 0 0 0 1px rgba(17, 17, 17, 0.08);
      }

      #game-wrapper.aee-mode .hud,
      #game-wrapper.aee-mode .status-bar,
      #game-wrapper.aee-mode .word-row {
        background: #ffffff;
        box-shadow: none;
      }

      #game-wrapper.aee-mode .hud,
      #game-wrapper.aee-mode .status-bar {
        position: relative;
        z-index: 2;
        border-color: rgba(79, 57, 37, 0.35);
      }

      #game-wrapper.aee-mode .board {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        grid-template-areas:
          "word"
          "bank";
        align-items: stretch;
        align-content: stretch;
        justify-items: stretch;
        gap: clamp(8px, 1.1vh, 12px);
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        overflow: visible;
      }

      #game-wrapper.aee-mode .rows-panel {
        grid-area: word;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: stretch;
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        padding-top: 0;
      }

      #game-wrapper.aee-mode .word-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        justify-items: center;
        align-items: stretch;
        gap: clamp(10px, 1.2vh, 14px);
        width: min(100%, 780px);
        height: 100%;
        max-height: 100%;
        padding: clamp(14px, 1.8vh, 18px) clamp(18px, 2.2vw, 24px);
        min-height: 0;
        margin: 0 auto;
        border-width: 2px;
        border-color: rgba(79, 57, 37, 0.38);
        border-radius: 20px;
        text-align: center;
      }

      #game-wrapper.aee-mode .word-main {
        width: 100%;
        display: flex;
        min-height: 0;
        max-width: 100%;
        align-items: flex-start;
        justify-content: center;
      }

      #game-wrapper.aee-mode .word-figure {
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 100%;
        width: auto;
        height: 100%;
        min-width: 0;
        min-height: 0;
        padding: 0;
        border: none;
        background: transparent;
        box-shadow: none;
      }

      #game-wrapper.aee-mode .word-row.is-complete .word-figure {
        background: transparent;
      }

      #game-wrapper.aee-mode .word-emoji {
        margin: 0;
        font-size: clamp(6rem, 12.5vw, 9rem);
        line-height: 0.9;
        transform: none;
        filter: drop-shadow(0 10px 16px rgba(73, 54, 40, 0.16));
      }

      #game-wrapper.aee-mode .row-check {
        display: none;
      }

      #game-wrapper.aee-mode .slots {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: clamp(12px, 1.6vw, 16px);
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
      }

      #game-wrapper.aee-mode .drop-slot {
        width: clamp(116px, 10.5vw, 136px);
        min-width: clamp(116px, 10.5vw, 136px);
        height: clamp(84px, 10.8vh, 98px);
        border-width: 3px;
        border-style: dashed;
        border-radius: 20px;
        border-color: #6d5d4e;
        background: #fffdf7;
        background-image: none;
      }

      #game-wrapper.aee-mode .drop-slot::after {
        font-size: 1.35rem;
      }

      #game-wrapper.aee-mode .drop-slot.is-filled {
        background: #effaf1;
        box-shadow: none;
      }

      #game-wrapper.aee-mode .bank-panel {
        grid-area: bank;
        display: flex;
        align-items: stretch;
        justify-content: center;

  <body>
    <div id="game-wrapper" class="modal-open">
      <div class="game-surface">
        <header class="hud">
          <div class="hud-title">

    <script>

      const wordsModeAEESource = [

        { emoji: "🌙", syllables: "LU|A" },
      ];

      function createModeEntries(sourceList, mode, startIndex) {
        return sourceList.map((item, offset) => ({
          q: "",
          index: startIndex + offset,
          mode,
          emoji: item.emoji,
          syllables: item.syllables,
        }));
      }

      const mode2Entries = createModeEntries(wordsMode2Source, "2", 0);
      const mode3Entries = createModeEntries(wordsMode3Source, "3", 100);
      const modeAEEEntries = createModeEntries(wordsModeAEESource, "aee", 200);

      const g_syllablesList = [...mode2Entries, ...mode3Entries, ...modeAEEEntries];

      const g_wordEmojiMap = Object.fromEntries(
        g_syllablesList.map((item) => [item.index, item.emoji]),
      );

      const wordsDatabase = g_syllablesList.map((item) => {
        const parts = item.syllables
          .split("|")
          .map((part) => part.trim().toUpperCase());
        const plainWord = parts.join("");

        return {
          ...item,
          parts,
          syllableCount: parts.length,
          label: parts.join("-"),
          plainWord,
          hasEmoji: true,
        };
      });

      const wordsMode2 = wordsDatabase.filter((word) => word.mode === "2");
      const wordsMode3 = wordsDatabase.filter((word) => word.mode === "3");
      const wordsModeAEE = wordsDatabase.filter((word) => word.mode === "aee");

      const wordsByMode = {
        2: wordsMode2,
        3: wordsMode3,
      };

      const aeeWordsDatabase = [...wordsModeAEE];

      const aeeSyllablesPool = [
        ...new Set(wordsModeAEE.flatMap((word) => word.parts)),
      ];

      const elements = {
        wrapper: document.getElementById("game-wrapper"),
        modal: document.getElementById("start-modal"),
        rowsPanel: document.getElementById("rows-panel"),
        bankPanel: document.getElementById("bank-panel"),
        bankGrid: document.getElementById("bank-grid"),
        bankTitle: document.querySelector(".bank-header h2"),
        hudSubtitle: document.getElementById("hud-subtitle"),
        statusText: document.getElementById("status-text"),
        nextPhaseButton: document.getElementById("next-phase-button"),
        changeLevelButton: document.getElementById("change-level-button"),
        touchGhost: document.getElementById("touch-ghost"),
      };

      if (
        elements.wrapper &&
        elements.touchGhost &&
        elements.touchGhost.parentElement !== elements.wrapper
      ) {
        elements.wrapper.appendChild(elements.touchGhost);
      }

      const state = {
        level: null,
        isAEEMode: false,
        round: 0,
        sessionTotal: 0,
        eligibleWords: [],
        deck: [],
        currentWords: [],
        currentPieces: [],
        selectedPieceId: null,
        placements: new Map(),
        hoverSlot: null,
        pointerDrag: null,
      };

      let pieceSequence = 0;

      function shuffle(list) {
        const copy = [...list];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function getWordEmoji(word) {
        return word.emoji || g_wordEmojiMap[word.index] || "🔤";
      }

      function getWordsPerRound() {
        return state.isAEEMode ? 1 : ROWS_PER_ROUND;
      }

      function getCurrentWord() {
        return state.currentWords[0] || null;
      }

      function getAEEProgressLabel(currentRound = state.round) {
        const safeTotal = state.sessionTotal || AEE_WORDS_PER_SESSION;
        return `Palavra ${currentRound} de ${safeTotal}`;
      }

      function setAdvanceButtonLabel(label) {
        elements.nextPhaseButton.textContent = label;
        elements.nextPhaseButton.setAttribute("aria-label", label);
      }

      function updateModeUi() {
        elements.wrapper.classList.toggle("aee-mode", state.isAEEMode);
        if (elements.hudSubtitle) {
          elements.hudSubtitle.textContent = state.isAEEMode
            ? "1 palavra por vez"
            : "4 por rodada";
        }
        if (elements.bankTitle) {
          elements.bankTitle.textContent = state.isAEEMode
            ? "Banco focal"
            : "Sílabas";
        }
      }

      function buildWordFigureMarkup(word) {
        return `<span class="word-emoji" aria-hidden="true">${getWordEmoji(word)}</span>`;
      }

      function buildSlotsMarkup(word) {
        return word.parts
          .map(
            (part, partIndex) => `
              <div
                class="drop-slot"
                data-slot-id="${word.index}-${partIndex}"
                data-word-index="${word.index}"
                data-expected="${part}"
                tabindex="0"
                role="button"
                aria-label="Espaço ${partIndex + 1}"
              ></div>
            `,
          )
          .join("");
      }

      function setStatus(text, emphasis = "Pronto") {
        elements.statusText.innerHTML = `<strong>${emphasis}:</strong> ${text}`;
      }

      function openModal() {
        elements.wrapper.classList.add("modal-open");
        elements.modal.classList.add("is-visible");
      }

      function closeModal() {
        elements.wrapper.classList.remove("modal-open");
        elements.modal.classList.remove("is-visible");
      }

      function requestGameFullscreen() {
        const fullscreenElement =
          document.fullscreenElement ||
          document.webkitFullscreenElement ||
          document.msFullscreenElement ||
          null;

        if (fullscreenElement) {
          return;
        }

        const primaryTarget = elements.wrapper || document.documentElement;
        const fallbackTarget =
          primaryTarget === document.documentElement
            ? null
            : document.documentElement;

        const requestFullscreenForTarget = (target) => {
          if (!target) {
            return false;
          }

          const requestMethod =
            target.requestFullscreen ||
            target.webkitRequestFullscreen ||
            target.msRequestFullscreen;

          if (typeof requestMethod !== "function") {
            return false;
          }

          try {
            const result = requestMethod.call(target);
            if (result && typeof result.catch === "function") {
              result.catch(() => {});
            }
            return true;
          } catch (error) {
            return false;
          }
        };

        if (requestFullscreenForTarget(primaryTarget)) {
          return;
        }

        requestFullscreenForTarget(fallbackTarget);
      }

      function rebuildDeck() {
        if (state.isAEEMode) {
          state.deck = shuffle(state.eligibleWords).slice(0, state.sessionTotal);
          return;
        }

        state.deck = shuffle(state.eligibleWords);
      }

      function ensureDeckHasEnoughWords() {
        if (state.isAEEMode || state.deck.length >= ROWS_PER_ROUND) {
          return;
        }

        const missingCount = ROWS_PER_ROUND - state.deck.length;
        const extraWords = shuffle(state.eligibleWords).slice(0, missingCount);
        state.deck = shuffle([...state.deck, ...extraWords]);
      }

      function createRoundPieces(words) {
        const createWordPieces = (word) =>
          word.parts.map((text, partIndex) => ({
            id: `${word.index}-${partIndex}-${pieceSequence += 1}`,
            text,
            wordIndex: word.index,
            partIndex,
            placed: false,
            intruder: false,
          }));

        if (state.isAEEMode) {
          const currentWord = words[0];
          if (!currentWord) {
            return [];
          }

          const intruderPieces = shuffle(
            aeeSyllablesPool.filter((syllable) => !currentWord.parts.includes(syllable)),
          )
            .slice(0, AEE_INTRUDER_COUNT)
            .map((text) => ({
              id: `intruder-${pieceSequence += 1}`,
              text,
              wordIndex: null,
              partIndex: null,
              placed: false,
              intruder: true,
            }));

          return shuffle([...createWordPieces(currentWord), ...intruderPieces]);
        }

        const pieces = words.flatMap((word) => createWordPieces(word));
        return shuffle(pieces);
      }

      function selectPiece(pieceId) {
        state.selectedPieceId = pieceId;

        elements.bankGrid
          .querySelectorAll(".syllable-card")
          .forEach((pieceElement) => {
            pieceElement.classList.toggle(
              "is-selected",
              pieceElement.dataset.pieceId === pieceId,
            );
          });
      }

      function clearHoverSlot() {
        if (!state.hoverSlot) {
          return;
        }

        state.hoverSlot.classList.remove("is-hover-valid", "is-hover-invalid");
        state.hoverSlot = null;
      }

      function setHoverSlot(slotElement, isValid) {
        if (!slotElement || slotElement.classList.contains("is-filled")) {
          clearHoverSlot();
          return;
        }

        if (state.hoverSlot && state.hoverSlot !== slotElement) {
          clearHoverSlot();
        }

        state.hoverSlot = slotElement;
        slotElement.classList.toggle("is-hover-valid", isValid);
        slotElement.classList.toggle("is-hover-invalid", !isValid);
      }

      function getPieceById(pieceId) {
        return state.currentPieces.find((piece) => piece.id === pieceId) || null;
      }

      function getPieceElement(pieceId) {
        return elements.bankGrid.querySelector(`[data-piece-id="${pieceId}"]`);
      }

      function removeTemporaryClass(element, className, delay = 320) {
        if (!element) {
          return;
        }

        element.classList.add(className);
        window.setTimeout(() => element.classList.remove(className), delay);
      }

      function createPlacedCard(text) {
        const placedCard = document.createElement("span");
        placedCard.className = "placed-card is-placed";
        placedCard.textContent = text;
        return placedCard;
      }

      function markRejected(pieceElement, slotElement) {
        if (pieceElement) {
          pieceElement.classList.remove("is-rejected");
          void pieceElement.offsetWidth;
          pieceElement.classList.add("is-rejected");
        }

        if (slotElement) {
          slotElement.classList.remove("is-rejected");
          void slotElement.offsetWidth;
          slotElement.classList.add("is-rejected");
        }
      }

      function updateCompletionState(wordIndex) {
        const slots = [
          ...elements.rowsPanel.querySelectorAll(
            `[data-word-index="${wordIndex}"] .drop-slot`,
          ),
        ];
        const row = elements.rowsPanel.querySelector(
          `[data-row-word-index="${wordIndex}"]`,
        );
        const wasComplete = row?.classList.contains("is-complete");

        const isComplete =
          slots.length > 0 &&
          slots.every((slot) => slot.classList.contains("is-filled"));

        if (row) {
          row.classList.toggle("is-complete", isComplete);
          if (isComplete && !wasComplete) {
            removeTemporaryClass(row, "is-just-completed", 420);
          }
        }
      }

      function finishRoundIfNeeded() {
        const totalSlots = state.currentWords.reduce(
          (total, word) => total + word.parts.length,
          0,
        );

        if (state.placements.size !== totalSlots) {
          return;
        }

        elements.nextPhaseButton.hidden = false;

        if (state.isAEEMode) {
          const isLastWord = state.round >= state.sessionTotal;
          setAdvanceButtonLabel(
            isLastWord ? "Jogar Novamente" : "Próxima Palavra",
          );
          setStatus(
            isLastWord
              ? "Sessão concluída. Toque em Jogar Novamente."
              : "Palavra concluída. Toque em Próxima Palavra.",
            "Muito bem",
          );
          return;
        }

        setAdvanceButtonLabel(">>");
        setStatus("4 de 4. Toque em >>.", "Muito bem");
      }

      function placePieceInSlot(pieceId, slotElement) {
        const piece = getPieceById(pieceId);
        const pieceElement = getPieceElement(pieceId);

        if (!piece || !pieceElement || piece.placed) {
          return false;
        }

        if (slotElement.classList.contains("is-filled")) {
          return false;
        }

        const expectedText = slotElement.dataset.expected;
        if (piece.text !== expectedText) {
          markRejected(pieceElement, slotElement);
          setStatus(`${piece.text} não entra aí.`, "Ops");
          return false;
        }

        piece.placed = true;
        state.placements.set(slotElement.dataset.slotId, piece.id);
        slotElement.classList.add("is-filled");
        slotElement.innerHTML = "";
        slotElement.append(createPlacedCard(piece.text));
        removeTemporaryClass(slotElement, "is-celebrating", 340);
        pieceElement.classList.add("is-used");
        pieceElement.setAttribute("aria-hidden", "true");

        selectPiece(null);
        updateCompletionState(slotElement.dataset.wordIndex);
        clearHoverSlot();

        if (state.isAEEMode) {
          const currentWord = getCurrentWord();
          const filledSlots = currentWord
            ? elements.rowsPanel.querySelectorAll(
                `[data-word-index="${currentWord.index}"] .drop-slot.is-filled`,
              ).length
            : 0;
          const missingSlots = currentWord
            ? currentWord.parts.length - filledSlots
            : 0;

          if (missingSlots > 0) {
            setStatus(
              missingSlots === 1
                ? "Falta 1 sílaba."
                : `Faltam ${missingSlots} sílabas.`,
              "Boa",
            );
          }
        } else {
          const finishedWords = [
            ...elements.rowsPanel.querySelectorAll(".word-row.is-complete"),
          ].length;

          setStatus(`${finishedWords} de ${ROWS_PER_ROUND}.`, "Boa");
        }

        finishRoundIfNeeded();
        return true;
      }

      function renderRows() {
        const rowsMarkup = state.currentWords
          .map(
            (word) => `
              <article class="word-row" data-row-word-index="${word.index}">
                <figure
                  class="word-figure"
                  role="img"
                  aria-label="${state.isAEEMode ? "Emoji" : "Objeto"} da palavra ${word.plainWord}"
                >
                  ${buildWordFigureMarkup(word)}
                </figure>

                <div class="word-main">
                  <div class="slots" data-word-index="${word.index}">
                    ${buildSlotsMarkup(word)}
                  </div>
                </div>

                <span class="row-check" aria-hidden="true">&#10003;</span>
              </article>
            `,
          )
          .join("");

        elements.rowsPanel.innerHTML = rowsMarkup;
      }

      function renderBank() {
        const bankMarkup = state.currentPieces
          .map(
            (piece) => `
              <button
                class="syllable-card"
                type="button"
                data-piece-id="${piece.id}"
                aria-label="Sílaba ${piece.text}"
              >
                ${piece.text}
              </button>
            `,
          )
          .join("");

        elements.bankGrid.innerHTML = bankMarkup;
      }

      function updateHud() {
        updateModeUi();
      }

      function drawWordsForRound() {
        const wordsPerRound = getWordsPerRound();
        ensureDeckHasEnoughWords();

        const nextWords = [];
        const usedIndexes = new Set();

        while (nextWords.length < wordsPerRound && state.deck.length > 0) {
          const word = state.deck.pop();
          if (!word || usedIndexes.has(word.index)) {
            continue;
          }
          usedIndexes.add(word.index);
          nextWords.push(word);
        }

        if (nextWords.length < wordsPerRound) {
          if (state.isAEEMode) {
            return nextWords;
          }
          rebuildDeck();
          return drawWordsForRound();
        }

        return nextWords;
      }

      function hideTouchGhost() {
        elements.touchGhost.style.display = "none";
        elements.touchGhost.textContent = "";
      }

      function loadRound() {
        if (!state.level && !state.isAEEMode) {
          return;
        }

        if (state.deck.length === 0) {
          rebuildDeck();
        }

        const nextWords = drawWordsForRound();
        if (nextWords.length === 0) {
          return;
        }

        state.round += 1;
        state.currentWords = nextWords;
        state.currentPieces = createRoundPieces(state.currentWords);
        state.selectedPieceId = null;
        state.placements = new Map();
        state.pointerDrag = null;
        setAdvanceButtonLabel(state.isAEEMode ? "Próxima Palavra" : ">>");
        elements.nextPhaseButton.hidden = true;

        renderRows();
        renderBank();
        updateHud();
        clearHoverSlot();
        hideTouchGhost();

        setStatus(
          state.isAEEMode
            ? `${getAEEProgressLabel()}. Arraste as sílabas para montar a palavra.`
            : "Monte as 4 palavras.",
          state.isAEEMode ? "Modo AEE" : "Valendo",
        );
      }

      function startGame(level) {
        state.isAEEMode = false;
        state.level = level;
        state.round = 0;
        state.sessionTotal = 0;
        state.currentWords = [];
        state.currentPieces = [];
        state.selectedPieceId = null;
        state.placements = new Map();
        state.pointerDrag = null;
        state.eligibleWords = [...(wordsByMode[level] || [])];
        rebuildDeck();
        updateModeUi();
        closeModal();
        loadRound();
      }

      function startAEEMode() {
        state.isAEEMode = true;
        state.level = null;
        state.round = 0;
        state.currentWords = [];
        state.currentPieces = [];
        state.selectedPieceId = null;
        state.placements = new Map();
        state.pointerDrag = null;
        state.eligibleWords = [...aeeWordsDatabase];
        state.sessionTotal = Math.min(
          AEE_WORDS_PER_SESSION,
          state.eligibleWords.length,
        );
        rebuildDeck();
        updateModeUi();
        closeModal();
        loadRound();
        requestGameFullscreen();
      }

      function getSlotFromEventTarget(target) {
        const slot = target.closest(".drop-slot");
        if (!slot || slot.classList.contains("is-filled")) {
          return null;
        }
        return slot;
      }

      function updateTouchGhostPosition(clientX, clientY) {
        const wrapperRect = elements.wrapper.getBoundingClientRect();
        elements.touchGhost.style.left = `${clientX - wrapperRect.left}px`;
        elements.touchGhost.style.top = `${clientY - wrapperRect.top}px`;
      }

      function showTouchGhost(text, clientX, clientY) {
        elements.touchGhost.textContent = text;
        elements.touchGhost.style.display = "inline-flex";
        updateTouchGhostPosition(clientX, clientY);
      }

      function handleSlotSelection(slotElement) {
        if (!state.selectedPieceId) {
          return;
        }
        placePieceInSlot(state.selectedPieceId, slotElement);
      }

      function togglePieceSelection(pieceId) {
        const piece = getPieceById(pieceId);
        if (!piece || piece.placed) {
          return;
        }

        const nextSelection = state.selectedPieceId === pieceId ? null : pieceId;
        selectPiece(nextSelection);

        if (nextSelection) {
          setStatus(`${piece.text} selecionada.`, "Selecionada");
        } else {
          setStatus("Escolha outra sílaba.", "Banco");
        }
      }

      function getSlotAtPoint(clientX, clientY) {
        const target = document.elementFromPoint(clientX, clientY);
        return target ? getSlotFromEventTarget(target) : null;
      }

      function resetDraggedPieceVisual(pieceId) {
        const pieceElement = getPieceElement(pieceId);
        if (!pieceElement) {
          return;
        }

        pieceElement.classList.remove("is-dragging", "is-lifted");
      }

      function startPointerDrag(event, pieceElement) {
        if (event.button !== undefined && event.button !== 0) {
          return;
        }

        const pieceId = pieceElement.dataset.pieceId;
        const piece = getPieceById(pieceId);
        if (!piece || piece.placed) {
          return;
        }

        event.preventDefault();
        state.pointerDrag = {
          pointerId: event.pointerId,
          pieceId,
          previousSelectedId: state.selectedPieceId,
          startX: event.clientX,
          startY: event.clientY,
          moved: false,
        };

        selectPiece(null);
        pieceElement.classList.add("is-dragging", "is-lifted");
        showTouchGhost(piece.text, event.clientX, event.clientY);
        clearHoverSlot();
      }

      function movePointerDrag(event) {
        if (!state.pointerDrag || state.pointerDrag.pointerId !== event.pointerId) {
          return;
        }

        const piece = getPieceById(state.pointerDrag.pieceId);
        if (!piece) {
          return;
        }

        const movedX = Math.abs(event.clientX - state.pointerDrag.startX);
        const movedY = Math.abs(event.clientY - state.pointerDrag.startY);
        if (movedX > 4 || movedY > 4) {
          state.pointerDrag.moved = true;
        }

        event.preventDefault();
        updateTouchGhostPosition(event.clientX, event.clientY);

        const slot = getSlotAtPoint(event.clientX, event.clientY);
        if (!slot) {
          clearHoverSlot();
          return;
        }

        setHoverSlot(slot, piece.text === slot.dataset.expected);
      }

      function finishPointerDrag(event, silent = false) {
        if (!state.pointerDrag) {
          return;
        }

        if (event && state.pointerDrag.pointerId !== event.pointerId) {
          return;
        }

        const { pieceId, moved, previousSelectedId } = state.pointerDrag;
        const piece = getPieceById(pieceId);
        const slot = event ? getSlotAtPoint(event.clientX, event.clientY) : null;

        resetDraggedPieceVisual(pieceId);
        hideTouchGhost();
        clearHoverSlot();
        state.pointerDrag = null;

        if (slot) {
          placePieceInSlot(pieceId, slot);
          return;
        }

        if (!moved) {
          if (silent) {
            return;
          }

          if (previousSelectedId === pieceId) {
            selectPiece(null);
            setStatus("Escolha outra sílaba.", "Banco");
          } else {
            selectPiece(pieceId);
            if (piece) {
              setStatus(`${piece.text} selecionada.`, "Selecionada");
            }
          }
          return;
        }

        if (!silent && piece) {
          setStatus(`${piece.text} voltou.`, "Banco");
        }
      }

      elements.modal.addEventListener("click", (event) => {
        const aeeButton = event.target.closest("[data-mode='aee']");
        if (aeeButton) {
          startAEEMode();
          return;
        }

        const button = event.target.closest("[data-level]");
        if (!button) {
          return;
        }

        startGame(Number(button.dataset.level));
      });

      elements.changeLevelButton.addEventListener("click", () => {
        openModal();
        setStatus("Escolha 2 ou 3 sílabas ou o Modo AEE.", "Pausa");
      });

      elements.nextPhaseButton.addEventListener("click", () => {
        if (state.isAEEMode && state.round >= state.sessionTotal) {
          startAEEMode();
          return;
        }

        loadRound();
      });

      elements.bankGrid.addEventListener("pointerdown", (event) => {
        const pieceElement = event.target.closest(".syllable-card");
        if (!pieceElement || pieceElement.classList.contains("is-used")) {
          return;
        }

        startPointerDrag(event, pieceElement);
      });

      elements.bankGrid.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        const pieceElement = event.target.closest(".syllable-card");
        if (!pieceElement || pieceElement.classList.contains("is-used")) {
          return;
        }

        event.preventDefault();
        togglePieceSelection(pieceElement.dataset.pieceId);
      });

      elements.rowsPanel.addEventListener("click", (event) => {
        const slot = getSlotFromEventTarget(event.target);
        if (!slot) {
          return;
        }

        handleSlotSelection(slot);
      });

      elements.rowsPanel.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        const slot = getSlotFromEventTarget(event.target);
        if (!slot) {
          return;
        }

        event.preventDefault();
        handleSlotSelection(slot);
      });

      document.addEventListener("pointermove", movePointerDrag);
      document.addEventListener("pointerup", (event) => finishPointerDrag(event));
      document.addEventListener("pointercancel", () => finishPointerDrag(null, true));
      document.addEventListener("fullscreenchange", clearHoverSlot);
      document.addEventListener("webkitfullscreenchange", clearHoverSlot);

      updateModeUi();
      updateHud();
      setStatus("Escolha 2 ou 3 sílabas ou o Modo AEE.", "Pronto");
    </script>
  </body>
</html>
